<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Connections</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 1rem;
        }
        
        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 1.5rem;
        }
        
        #game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 400px;
            width: 100%;
        }
        
        .tile {
            aspect-ratio: 1;
            background: #2d2d4a;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            padding: 8px;
            animation: dropIn 0.3s ease-out;
        }
        
        @keyframes dropIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .tile:hover {
            background: #3d3d5a;
        }
        
        .tile.selected {
            border-color: #ffd700;
            background: #3d3d5a;
        }
        
        .tile.empty {
            background: transparent;
            cursor: default;
        }
        
        .tile .emoji {
            font-size: 2.5rem;
            margin-bottom: 4px;
        }
        
        .tile .label {
            color: #fff;
            font-size: 0.75rem;
            text-align: center;
        }
        
        #solved-categories {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 400px;
        }
        
        .solved {
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            color: #fff;
            font-weight: bold;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .difficulty-1 { background: #ffd700; color: #000; }
        .difficulty-2 { background: #4fc3f7; color: #000; }
        .difficulty-3 { background: #81c784; color: #000; }
        .difficulty-4 { background: #e91e63; color: #fff; }
        
        #result {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
            min-height: 3rem;
        }
        
        #result.show {
            display: block;
        }
        
        #result.correct {
            background: #1b5e20;
            color: #a5d6a7;
        }
        
        #result.wrong {
            background: #b71c1c;
            color: #ffcdd2;
        }
        
        #reset-btn {
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: #888;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
        }
        
        #reset-btn:hover {
            background: #2d2d4a;
            color: #fff;
        }
        
        #guess-btn {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        #guess-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>🎯 India Connections</h1>
    <p class="subtitle">Find the connection between 4 items</p>
    
    <div id="game-container"></div>
    
    <button id="guess-btn" disabled>Guess</button>
    <button id="reset-btn">New Game</button>
    <div id="result"></div>
    <div id="solved-categories"></div>
    
    <script>
        const categories = [
            {
                name: "North Indian Curries",
                emoji: "🍛",
                items: [
                    { emoji: "🥘", label: "Biryani" },
                    { emoji: "🍲", label: "Butter Chicken" },
                    { emoji: "🥘", label: "Dal Makhani" },
                    { emoji: "🍖", label: "Rogan Josh" }
                ]
            },
            {
                name: "South Indian Breakfast",
                emoji: "🫓",
                items: [
                    { emoji: "🥞", label: "Dosa" },
                    { emoji: "🥟", label: "Idli" },
                    { emoji: "🥣", label: "Upma" },
                    { emoji: "🥞", label: "Pongal" }
                ]
            },
            {
                name: "Indian Snacks",
                emoji: "🥨",
                items: [
                    { emoji: "🥟", label: "Samosa" },
                    { emoji: "🥠", label: "Pakora" },
                    { emoji: "🥨", label: "Bhujia" },
                    { emoji: "🧆", label: "Chaat" }
                ]
            },
            {
                name: "Indian Sweets",
                emoji: "🍬",
                items: [
                    { emoji: "🟡", label: "Gulab Jamun" },
                    { emoji: "⚪", label: "Rasgulla" },
                    { emoji: "🟡", label: "Jalebi" },
                    { emoji: "🟤", label: "Ladoo" }
                ]
            },
            {
                name: "Mumbai Street Food",
                emoji: "🌭",
                items: [
                    { emoji: "🌭", label: "Vada Pav" },
                    { emoji: "🥪", label: "Pav Bhaji" },
                    { emoji: "🥪", label: "Bhelpuri" },
                    { emoji: "🧋", label: "Chai" }
                ]
            },
            {
                name: "Punjabi Favorites",
                emoji: "🔶",
                items: [
                    { emoji: "🍲", label: "Sarson Da Saag" },
                    { emoji: "🫓", label: "Makki Ki Roti" },
                    { emoji: "🥘", label: "Kadhi Pakora" },
                    { emoji: "🥔", label: "Aloo Gobi" }
                ]
            },
            {
                name: "Tamil Nadu",
                emoji: "🫱",
                items: [
                    { emoji: "🥣", label: "Sambar" },
                    { emoji: "🥞", label: "Masala Dosa" },
                    { emoji: "🍚", label: "Rasam" },
                    { emoji: "🥗", label: "Avial" }
                ]
            },
            {
                name: "Bengali Sweets",
                emoji: "🎂",
                items: [
                    { emoji: "⚪", label: "Rasgulla" },
                    { emoji: "🟤", label: "Sandesh" },
                    { emoji: "🟡", label: "Rasamalai" },
                    { emoji: "🟡", label: "Mishti Doi" }
                ]
            }
        ];
        
        let currentTiles = [];
        let selectedIndices = [];
        let solvedCategories = [];
        let solvedIndices = new Set();
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function initGame() {
            const shuffled = shuffle([...categories]).slice(0, 4);
            currentTiles = shuffle(shuffled.flatMap(cat => cat.items));
            selectedIndices = [];
            solvedCategories = [];
            solvedIndices = new Set();
            render();
        }
        
        function render() {
            const container = document.getElementById('game-container');
            const guessBtn = document.getElementById('guess-btn');
            const result = document.getElementById('result');
            const solvedContainer = document.getElementById('solved-categories');
            
            container.innerHTML = currentTiles.map((tile, i) => {
                const isEmpty = solvedIndices.has(i);
                return `
                <div class="tile ${selectedIndices.includes(i) ? 'selected' : ''} ${isEmpty ? 'empty' : ''}" 
                     data-index="${i}" onclick="toggleSelect(${i})">
                    ${isEmpty ? '' : `<span class="emoji">${tile.emoji}</span><span class="label">${tile.label}</span>`}
                </div>
            `}).join('');
            
            guessBtn.disabled = selectedIndices.length !== 4;
            if (selectedIndices.length !== 4) {
                result.classList.remove('show');
            }
            
            solvedContainer.innerHTML = solvedCategories.map(s => `
                <div class="solved ${s.difficulty}">${s.emoji} ${s.name}</div>
            `).join('');
        }
        
        function toggleSelect(index) {
            if (solvedCategories.length === 4) return;
            if (solvedIndices.has(index)) return;
            
            const idx = selectedIndices.indexOf(index);
            if (idx >= 0) {
                selectedIndices.splice(idx, 1);
            } else if (selectedIndices.length < 4) {
                selectedIndices.push(index);
            }
            render();
            
            if (selectedIndices.length === 4) {
                checkGuess();
            }
        }
        
        function checkGuess() {
            const tiles = selectedIndices.map(i => ({...currentTiles[i], index: i}));
            const tileLabels = tiles.map(t => t.label);
            
            for (const cat of categories) {
                const catLabels = cat.items.map(i => i.label);
                const allMatch = tileLabels.every(l => catLabels.includes(l));
                
                if (allMatch) {
                    const difficulty = solvedCategories.length + 1;
                    solvedCategories.push({
                        name: cat.name,
                        emoji: cat.emoji,
                        difficulty: `difficulty-${difficulty}`
                    });
                    
                    // Mark these tiles as solved
                    selectedIndices.forEach(idx => solvedIndices.add(idx));
                    
                    const result = document.getElementById('result');
                    const diffName = difficulty === 1 ? 'Easy' : difficulty === 2 ? 'Medium' : difficulty === 3 ? 'Hard' : 'Tricky';
                    result.classList.add('show', 'correct');
                    result.textContent = `✅ ${cat.emoji} ${cat.name} (${diffName})`;
                    
                    selectedIndices = [];
                    
                    if (solvedCategories.length === 4) {
                        setTimeout(() => {
                            result.textContent = "🎉 You Won!";
                        }, 1500);
                    }
                    
                    setTimeout(render, 1500);
                    return;
                }
            }
            
            const result = document.getElementById('result');
            result.classList.add('show', 'wrong');
            result.textContent = "❌ One away!" + (selectedIndices.length === 4 ? " Try again." : "");
            
            setTimeout(() => {
                selectedIndices = [];
                render();
            }, 1000);
        }
        
        document.getElementById('guess-btn').addEventListener('click', checkGuess);
        document.getElementById('reset-btn').addEventListener('click', initGame);
        
        initGame();
    </script>
</body>
</html>
