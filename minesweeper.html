<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minesweeper 💣</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        
        h1 { color: #0f0; margin-bottom: 10px; }
        
        #stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #stats span { color: #0f0; font-weight: bold; }
        
        #game {
            display: grid;
            grid-template-columns: repeat(9, 36px);
            gap: 2px;
            background: #333;
            padding: 4px;
            border-radius: 4px;
        }
        
        .cell {
            width: 36px;
            height: 36px;
            background: #555;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .cell:active { transform: scale(0.95); }
        
        .cell.revealed { background: #222; cursor: default; }
        .cell.mine { background: #f00; }
        .cell.flagged { color: #f00; }
        
        .cell[data-num="1"] { color: #00f; }
        .cell[data-num="2"] { color: #0f0; }
        .cell[data-num="3"] { color: #f00; }
        .cell[data-num="4"] { color: #00f; }
        .cell[data-num="5"] { color: #f00; }
        .cell[data-num="6"] { color: #0ff; }
        .cell[data-num="7"] { color: #000; }
        .cell[data-num="8"] { color: #888; }
        
        #message {
            margin: 15px;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
        }
        #message.win { color: #0f0; }
        #message.lose { color: #f00; }
        
        button {
            padding: 12px 24px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>💣 Minesweeper</h1>
    
    <div id="stats">
        <div>Mines: <span id="mines">10</span></div>
        <div>Time: <span id="time">0</span></div>
    </div>
    
    <div id="game"></div>
    
    <div id="message"></div>
    <button id="restart">New Game</button>
    
    <script>
        const ROWS = 9;
        const COLS = 9;
        const MINES = 10;
        
        let board = [];
        let revealed = [];
        let flagged = [];
        let gameOver = false;
        let firstClick = true;
        let timer = 0;
        let timerInterval = null;
        
        const gameEl = document.getElementById('game');
        const minesEl = document.getElementById('mines');
        const timeEl = document.getElementById('time');
        const messageEl = document.getElementById('message');
        
        function init() {
            gameOver = false;
            firstClick = true;
            timer = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameOver) {
                    timer++;
                    timeEl.textContent = timer;
                }
            }, 1000);
            
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            revealed = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            flagged = Array(ROWS).fill().map(() => Array(COLS).fill(false));
            
            minesEl.textContent = MINES;
            timeEl.textContent = 0;
            messageEl.textContent = '';
            messageEl.className = '';
            
            render();
        }
        
        function placeMines(safeR, safeC) {
            let placed = 0;
            while (placed < MINES) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                if (board[r][c] !== -1 && !(r === safeR && c === safeC)) {
                    board[r][c] = -1;
                    placed++;
                }
            }
            
            // Calculate numbers
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] !== -1) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) {
                                    count++;
                                }
                            }
                        }
                        board[r][c] = count;
                    }
                }
            }
        }
        
        function reveal(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            if (revealed[r][c] || flagged[r][c]) return;
            
            revealed[r][c] = true;
            
            if (board[r][c] === -1) {
                gameOver = true;
                clearInterval(timerInterval);
                messageEl.textContent = '💥 BOOM! Game Over!';
                messageEl.className = 'lose';
                showMines(r, c);
                return;
            }
            
            if (board[r][c] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
            
            checkWin();
            render();
        }
        
        function toggleFlag(r, c, e) {
            e.preventDefault();
            if (gameOver || revealed[r][c]) return;
            
            flagged[r][c] = !flagged[r][c];
            
            const flagCount = flagged.flat().filter(f => f).length;
            minesEl.textContent = MINES - flagCount;
            render();
        }
        
        function showMines(triggerR, triggerC) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] === -1 && !(r === triggerR && c === triggerC)) {
                        revealed[r][c] = true;
                    }
                }
            }
            render();
        }
        
        function checkWin() {
            let unrevealedSafe = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!revealed[r][c] && board[r][c] !== -1) {
                        unrevealedSafe++;
                    }
                }
            }
            
            if (unrevealedSafe === 0) {
                gameOver = true;
                clearInterval(timerInterval);
                messageEl.textContent = '🎉 You Win!';
                messageEl.className = 'win';
            }
        }
        
        function render() {
            gameEl.innerHTML = '';
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (revealed[r][c]) {
                        cell.classList.add('revealed');
                        if (board[r][c] === -1) {
                            cell.classList.add('mine');
                            cell.textContent = '💣';
                        } else if (board[r][c] > 0) {
                            cell.textContent = board[r][c];
                            cell.dataset.num = board[r][c];
                        }
                    } else if (flagged[r][c]) {
                        cell.classList.add('flagged');
                        cell.textContent = '🚩';
                    }
                    
                    cell.onclick = () => {
                        if (!flagged[r][c]) {
                            if (firstClick) {
                                firstClick = false;
                                placeMines(r, c);
                            }
                            reveal(r, c);
                        }
                    };
                    
                    cell.oncontextmenu = (e) => toggleFlag(r, c, e);
                    
                    gameEl.appendChild(cell);
                }
            }
        }
        
        document.getElementById('restart').onclick = init;
        
        init();
    </script>
</body>
</html>
