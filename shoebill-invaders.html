<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shoebill Invaders 🦅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }
        
        h1 { color: #0f0; margin: 10px 0; font-size: 24px; text-shadow: 0 0 10px #0f0; }
        
        #stats { display: flex; gap: 20px; margin-bottom: 10px; font-size: 16px; }
        #stats span { color: #0f0; }
        
        #game-container {
            position: relative;
            border: 3px solid #0f0;
            border-radius: 4px;
        }
        
        canvas { display: block; background: #0a0a15; }
        
        #touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            gap: 10px;
            margin-top: 15px;
        }
        
        .tc-btn {
            background: rgba(0,255,0,0.3);
            border: 2px solid #0f0;
            border-radius: 10px;
            color: #0f0;
            font-size: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .tc-btn:active { background: rgba(0,255,0,0.6); }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #overlay.hidden { display: none; }
        #overlay h2 { color: #0f0; font-size: 36px; margin-bottom: 15px; }
        #overlay p { color: #888; margin-bottom: 20px; }
        
        .btn {
            padding: 15px 30px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🦅 Shoebill Invaders</h1>
    
    <div id="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Wave: <span id="wave">1</span></div>
        <div>Lives: <span id="lives">3</span></div>
    </div>
    
    <div id="game-container">
        <canvas id="game" width="320" height="450"></canvas>
    </div>
    
    <div id="touch-controls">
        <div></div>
        <div class="tc-btn" id="btnShoot">🔫</div>
        <div></div>
        <div class="tc-btn" id="btnLeft">◄</div>
        <div></div>
        <div class="tc-btn" id="btnRight">►</div>
    </div>
    
    <div id="overlay">
        <h2>🦅 Shoebill Invaders</h2>
        <p>Shoot the alien bugs!</p>
        <button class="btn" id="start-btn">Start</button>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        
        let player = { x: W/2, y: H - 50, w: 40, h: 40 };
        let bullets = [];
        let enemies = [];
        let particles = [];
        let score = 0;
        let lives = 3;
        let wave = 1;
        let gameRunning = false;
        let frame = 0;
        let enemyDir = 1;
        let lastShot = 0;
        
        function init() {
            player = { x: W/2, y: H - 50, w: 40, h: 40 };
            bullets = [];
            particles = [];
            score = 0;
            lives = 3;
            wave = 1;
            enemyDir = 1;
            frame = 0;
            
            spawnWave();
            
            document.getElementById('score').textContent = '0';
            document.getElementById('wave').textContent = '1';
            document.getElementById('lives').textContent = '3';
            document.getElementById('overlay').classList.add('hidden');
            
            gameRunning = true;
            loop();
        }
        
        function spawnWave() {
            enemies = [];
            const rows = Math.min(2 + wave, 5);
            const cols = Math.min(6 + wave, 10);
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    enemies.push({
                        x: 40 + c * 30,
                        y: 50 + r * 35,
                        w: 25,
                        h: 25,
                        type: r === 0 ? 'boss' : r === 1 ? 'medium' : 'small',
                        alive: true
                    });
                }
            }
        }
        
        function drawShoebill(x, y) {
            // Body
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.ellipse(x, y + 10, 18, 22, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Wings
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.ellipse(x - 20, y + 5, 8, 15, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 20, y + 5, 8, 15, 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Neck
            ctx.fillStyle = '#888';
            ctx.fillRect(x - 6, y - 20, 12, 25);
            
            // Head
            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.ellipse(x, y - 28, 14, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye
            ctx.fillStyle = '#ff0';
            ctx.beginPath();
            ctx.arc(x + 5, y - 32, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 6, y - 32, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Massive beak!
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.moveTo(x + 10, y - 30);
            ctx.lineTo(x + 30, y - 25);
            ctx.lineTo(x + 30, y - 18);
            ctx.lineTo(x + 10, y - 22);
            ctx.closePath();
            ctx.fill();
            
            // Beak hook
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 30, y - 20, 5, 0, Math.PI * 0.8);
            ctx.stroke();
        }
        
        function drawEnemy(e) {
            const colors = { boss: '#f0f', medium: '#f80', small: '#ff0' };
            ctx.fillStyle = colors[e.type];
            
            // UFO body
            ctx.beginPath();
            ctx.ellipse(e.x, e.y, e.w/2, e.h/3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Dome
            ctx.beginPath();
            ctx.ellipse(e.x, e.y - 5, e.w/3, e.h/4, 0, Math.PI, 0);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(e.x - 5, e.y - 2, 3, 0, Math.PI * 2);
            ctx.arc(e.x + 5, e.y - 2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Legs
            ctx.strokeStyle = colors[e.type];
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(e.x - 8, e.y + 8);
            ctx.lineTo(e.x - 10, e.y + 15);
            ctx.moveTo(e.x + 8, e.y + 8);
            ctx.lineTo(e.x + 10, e.y + 15);
            ctx.stroke();
        }
        
        function draw() {
            // Space background
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, W, H);
            
            // Stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const sx = (i * 37 + frame * 0.1) % W;
                const sy = (i * 23 + frame * 0.2) % H;
                ctx.fillRect(sx, sy, 1, 1);
            }
            
            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, p.s, p.s);
            });
            
            // Bullets
            ctx.fillStyle = '#0f0';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 2, b.y, 4, 10);
            });
            
            // Enemies
            enemies.forEach(e => {
                if (e.alive) drawEnemy(e);
            });
            
            // Player (shoebill)
            drawShoebill(player.x, player.y);
        }
        
        function update() {
            frame++;
            
            // Move bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 8;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }
            
            // Move enemies
            let hitEdge = false;
            enemies.forEach(e => {
                if (!e.alive) return;
                e.x += enemyDir * (1 + wave * 0.3);
                if (e.x < 20 || e.x > W - 20) hitEdge = true;
                
                // Drop down occasionally
                if (frame % 60 === 0) {
                    e.y += 10;
                }
                
                // Reach player
                if (e.y + e.h/2 > player.y - player.h/2) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    if (lives <= 0) gameOver();
                    else resetPlayer();
                    return;
                }
            });
            
            if (hitEdge) {
                enemyDir *= -1;
                enemies.forEach(e => { e.y += 15; });
            }
            
            // Bullet collision with enemies
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (!e.alive) continue;
                    if (b.x > e.x - e.w/2 && b.x < e.x + e.w/2 &&
                        b.y > e.y - e.h/2 && b.y < e.y + e.h/2) {
                        bullets.splice(i, 1);
                        e.alive = false;
                        score += e.type === 'boss' ? 30 : e.type === 'medium' ? 20 : 10;
                        document.getElementById('score').textContent = score;
                        
                        // Explosion particles
                        for (let k = 0; k < 10; k++) {
                            particles.push({
                                x: e.x, y: e.y,
                                vx: (Math.random() - 0.5) * 5,
                                vy: (Math.random() - 0.5) * 5,
                                c: ['#f0f','#f80','#ff0'][Math.floor(Math.random()*3)],
                                s: 3 + Math.random() * 3
                            });
                        }
                        break;
                    }
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.s *= 0.95;
                if (p.s < 0.5) particles.splice(i, 1);
            }
            
            // Wave complete?
            if (enemies.every(e => !e.alive)) {
                wave++;
                document.getElementById('wave').textContent = wave;
                spawnWave();
            }
        }
        
        function resetPlayer() {
            player.x = W/2;
            enemies.forEach(e => {
                if (e.alive) e.y += 20;
            });
        }
        
        function shoot() {
            const now = Date.now();
            if (now - lastShot < 300) return;
            lastShot = now;
            bullets.push({ x: player.x, y: player.y - 25 });
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('overlay').classList.remove('hidden');
            document.querySelector('#overlay h2').textContent = '💥 GAME OVER';
            document.querySelector('#overlay p').textContent = 'Score: ' + score;
            document.getElementById('start-btn').textContent = 'Play Again';
        }
        
        function loop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        // Keyboard
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                player.x = Math.max(30, player.x - 8);
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                player.x = Math.min(W - 30, player.x + 8);
            }
            if (e.code === 'Space') {
                shoot();
            }
        });
        
        // Touch controls
        document.getElementById('btnLeft').addEventListener('touchstart', e => {
            e.preventDefault();
            player.x = Math.max(30, player.x - 8);
        });
        document.getElementById('btnLeft').addEventListener('mousedown', e => {
            player.x = Math.max(30, player.x - 8);
        });
        
        document.getElementById('btnRight').addEventListener('touchstart', e => {
            e.preventDefault();
            player.x = Math.min(W - 30, player.x + 8);
        });
        document.getElementById('btnRight').addEventListener('mousedown', e => {
            player.x = Math.min(W - 30, player.x + 8);
        });
        
        document.getElementById('btnShoot').addEventListener('touchstart', e => {
            e.preventDefault();
            shoot();
        });
        document.getElementById('btnShoot').addEventListener('mousedown', e => {
            shoot();
        });
        
        document.getElementById('start-btn').onclick = init;
        
        draw();
    </script>
</body>
</html>
