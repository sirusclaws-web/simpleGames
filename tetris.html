<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tetris 🧱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #fff;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        h1 { color: #0ff; font-size: 24px; margin: 10px 0; }
        
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        #game-container {
            border: 3px solid #0ff;
            border-radius: 4px;
        }
        
        canvas { display: block; background: #000; }
        
        #stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        #stats span { color: #0ff; font-weight: bold; }
        
        /* Big visible touch buttons */
        #touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 50px);
            gap: 10px;
            margin-top: 15px;
        }
        
        .touch-btn {
            background: rgba(0,255,255,0.3);
            border: 2px solid #0ff;
            border-radius: 10px;
            color: #0ff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active, .touch-btn.pressed {
            background: rgba(0,255,255,0.6);
        }
        
        #start-btn {
            padding: 15px 30px;
            background: #0ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #overlay.hidden { display: none; }
        #overlay h2 { font-size: 36px; color: #f0f; margin-bottom: 15px; }
        #overlay p { color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🧱 Tetris</h1>
    
    <div id="game-wrapper">
        <div id="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
        
        <div id="game-container">
            <canvas id="game" width="240" height="400"></canvas>
        </div>
        
        <div id="touch-controls">
            <div class="touch-btn" id="btnRotate">↻</div>
            <div class="touch-btn" id="btnDrop">↓</div>
            <div class="touch-btn" id="btnRotate2">↻</div>
            <div class="touch-btn" id="btnLeft">←</div>
            <div></div>
            <div class="touch-btn" id="btnRight">→</div>
        </div>
        
        <button id="start-btn">Start Game</button>
    </div>
    
    <div id="overlay">
        <h2>🧱 Tetris</h2>
        <p>Stack blocks, clear lines!</p>
        <button id="play-btn">Play</button>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const COLS = 12, ROWS = 20, BLOCK = 20;
        
        const PIECES = [
            {c:'#0ff', s:[[1,1,1,1]]},
            {c:'#ff0', s:[[1,1],[1,1]]},
            {c:'#f0f', s:[[0,1,0],[1,1,1]]},
            {c:'#0f0', s:[[0,1,1],[1,1,0]]},
            {c:'#f00', s:[[1,1,0],[0,1,1]]},
            {c:'#00f', s:[[1,0,0],[1,1,1]]},
            {c:'#f80', s:[[0,0,1],[1,1,1]]}
        ];
        
        let board = [], piece = null, nextP = null;
        let x = 0, y = 0, score = 0, level = 1, lines = 0;
        let running = false, dropTime = 1000, lastDrop = 0;
        
        function init() {
            board = [];
            for (let r = 0; r < ROWS; r++) board[r] = Array(COLS).fill(0);
        }
        
        function rand() { return {...PIECES[Math.floor(Math.random() * PIECES.length)]}; }
        
        function spawn() {
            piece = nextP || rand();
            nextP = rand();
            x = Math.floor(COLS/2) - Math.floor(piece.s[0].length/2);
            y = 0;
            if (collide(0, 0, piece.s)) gameOver();
        }
        
        function collide(dx, dy, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        let nx = x + c + dx, ny = y + r + dy;
                        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
                        if (ny >= 0 && board[ny][nx]) return true;
                    }
                }
            }
            return false;
        }
        
        function rotate() {
            let ns = [];
            for (let c = 0; c < piece.s[0].length; c++) {
                ns[c] = [];
                for (let r = piece.s.length - 1; r >= 0; r--) ns[c].push(piece.s[r][c]);
            }
            if (!collide(0, 0, ns) || !collide(-1, 0, ns) || !collide(1, 0, ns)) piece.s = ns;
        }
        
        function move(dx, dy) {
            if (!collide(dx, dy, piece.s)) {
                x += dx; y += dy;
                return true;
            }
            return false;
        }
        
        function lock() {
            piece.s.forEach((row, ry) => {
                row.forEach((v, cx) => {
                    if (v && y + ry >= 0) board[y+ry][x+cx] = piece.c;
                });
            });
            clearLines();
            spawn();
        }
        
        function clearLines() {
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(c => c)) {
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(0));
                    lines++; r++;
                }
            }
            if (lines) {
                score += [0,100,300,500,800][Math.min(lines,4)] * level;
                level = Math.floor(lines/10) + 1;
                dropTime = Math.max(100, 1000 - (level-1)*100);
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 240, 400);
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++)
                    if (board[r][c]) drawBlock(c, r, board[r][c]);
            if (piece) piece.s.forEach((row, ry) =>
                row.forEach((v, cx) => { if (v) drawBlock(x+cx, y+ry, piece.c); })
            );
        }
        
        function drawBlock(cx, cy, col) {
            ctx.fillStyle = col;
            ctx.fillRect(cx*BLOCK+1, cy*BLOCK+1, BLOCK-2, BLOCK-2);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(cx*BLOCK+1, cy*BLOCK+1, BLOCK-2, 4);
            ctx.fillRect(cx*BLOCK+1, cy*BLOCK+1, 4, BLOCK-2);
        }
        
        function gameOver() {
            running = false;
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('play-btn').textContent = 'Play Again';
        }
        
        function loop(time) {
            if (!running) return;
            if (time - lastDrop > dropTime) {
                if (!move(0, 1)) lock();
                lastDrop = time;
            }
            draw();
            requestAnimationFrame(loop);
        }
        
        function start() {
            init();
            score = 0; level = 1; lines = 0; dropTime = 1000;
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            nextP = rand();
            spawn();
            running = true;
            document.getElementById('overlay').classList.add('hidden');
            lastDrop = performance.now();
            draw();
            loop(lastDrop);
        }
        
        // Button handlers
        function btn(id, fn) {
            const el = document.getElementById(id);
            const act = (e) => { e.preventDefault(); if(running || id.startsWith('btn') === false) fn(); };
            el.addEventListener('touchstart', act);
            el.addEventListener('mousedown', act);
            el.addEventListener('click', act);
        }
        
        btn('btnLeft', () => { if(running) { move(-1,0); draw(); }});
        btn('btnRight', () => { if(running) { move(1,0); draw(); }});
        btn('btnDrop', () => { if(running) { move(0,1); draw(); }});
        btn('btnRotate', () => { if(running) { rotate(); draw(); }});
        btn('btnRotate2', () => { if(running) { rotate(); draw(); }});
        
        document.getElementById('start-btn').addEventListener('click', start);
        document.getElementById('play-btn').addEventListener('click', start);
        
        // Keyboard
        document.addEventListener('keydown', e => {
            if (!running) return;
            if (e.code === 'ArrowLeft') { move(-1,0); draw(); }
            else if (e.code === 'ArrowRight') { move(1,0); draw(); }
            else if (e.code === 'ArrowDown') { move(0,1); draw(); }
            else if (e.code === 'ArrowUp') { rotate(); draw(); }
            else if (e.code === 'Space') { while(move(0,1)); lock(); draw(); }
        });
        
        init(); draw();
    </script>
</body>
</html>
