<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris 🧱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        h1 {
            color: #ff00ff;
            font-size: 2rem;
            text-shadow: 0 0 10px #ff00ff;
            margin-bottom: 0.5rem;
        }
        
        .game-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        #game-container {
            border: 4px solid #00ffff;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        
        canvas {
            display: block;
            background: #000;
        }
        
        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .info-box {
            background: #1a1a2e;
            border: 2px solid #00ffff;
            border-radius: 4px;
            padding: 15px;
            min-width: 100px;
        }
        
        .info-box label {
            color: #888;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 5px;
        }
        
        .info-box .value {
            color: #00ffff;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        #next-piece {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
        }
        
        #controls {
            color: #555;
            font-size: 0.75rem;
            margin-top: 10px;
            text-align: center;
        }
        
        #start-screen, #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        #game-over {
            display: none;
        }
        
        #game-over.show {
            display: flex;
        }
        
        #start-screen h2, #game-over h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #ff00ff;
        }
        
        .btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn:hover {
            box-shadow: 0 0 20px #00ffff;
        }
    </style>
</head>
<body>
    <h1>🧱 Tetris</h1>
    
    <div class="game-row">
        <div id="game-container">
            <canvas id="game" width="240" height="400"></canvas>
        </div>
        
        <div id="sidebar">
            <div class="info-box">
                <label>SCORE</label>
                <div class="value" id="score">0</div>
            </div>
            
            <div class="info-box">
                <label>LEVEL</label>
                <div class="value" id="level">1</div>
            </div>
            
            <div class="info-box">
                <label>NEXT</label>
                <canvas id="next-piece" width="80" height="80"></canvas>
            </div>
            
            <div id="controls">
                ← → Move<br>
                ↑ Rotate<br>
                ↓ Soft Drop<br>
                Space: Hard Drop
            </div>
            
            <button class="btn" id="start-btn">Start</button>
        </div>
    </div>
    
    <div id="start-screen">
        <h2>🧱 Tetris</h2>
        <p>Stack blocks. Clear lines.</p>
    </div>
    
    <div id="game-over">
        <h2>Game Over!</h2>
        <p>Score: <span id="final-score">0</span></p>
        <br>
        <button class="btn" id="restart-btn">Play Again</button>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 12;
        const ROWS = 20;
        const BLOCK = 20;
        
        // Tetris pieces (colors match classic)
        const PIECES = [
            // I - cyan
            { shape: [[1,1,1,1]], color: '#00ffff' },
            // O - yellow
            { shape: [[1,1],[1,1]], color: '#ffff00' },
            // T - purple
            { shape: [[0,1,0],[1,1,1]], color: '#ff00ff' },
            // S - green
            { shape: [[0,1,1],[1,1,0]], color: '#00ff00' },
            // Z - red
            { shape: [[1,1,0],[0,1,1]], color: '#ff0000' },
            // J - blue
            { shape: [[1,0,0],[1,1,1]], color: '#0000ff' },
            // L - orange
            { shape: [[0,0,1],[1,1,1]], color: '#ff8800' }
        ];
        
        let board = [];
        let currentPiece = null;
        let currentX = 0;
        let currentY = 0;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = false;
        let dropInterval = 1000;
        let lastDrop = 0;
        
        function createBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = 0;
                }
            }
        }
        
        function randomPiece() {
            return {...PIECES[Math.floor(Math.random() * PIECES.length)]};
        }
        
        function spawnPiece() {
            currentPiece = nextPiece || randomPiece();
            nextPiece = randomPiece();
            currentX = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
            currentY = 0;
            
            // Check game over
            if (collision(0, 0, currentPiece.shape)) {
                gameOver();
            }
            
            drawNext();
        }
        
        function collision(dx, dy, shape) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const newX = currentX + c + dx;
                        const newY = currentY + r + dy;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        if (newY >= 0 && board[newY][newX]) return true;
                    }
                }
            }
            return false;
        }
        
        function rotatePiece() {
            const rotated = [];
            for (let c = 0; c < currentPiece.shape[0].length; c++) {
                rotated[c] = [];
                for (let r = currentPiece.shape.length - 1; r >= 0; r--) {
                    rotated[c].push(currentPiece.shape[r][c]);
                }
            }
            return rotated;
        }
        
        function movePiece(dx, dy) {
            if (!collision(dx, dy, currentPiece.shape)) {
                currentX += dx;
                currentY += dy;
                return true;
            }
            return false;
        }
        
        function rotate() {
            const rotated = rotatePiece();
            if (!collision(0, 0, rotated)) {
                currentPiece.shape = rotated;
            } else if (!collision(-1, 0, rotated) && !collision(1, 0, rotated)) {
                // Wall kick attempt
                currentPiece.shape = rotated;
            }
        }
        
        function lockPiece() {
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[r].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        const y = currentY + r;
                        const x = currentX + c;
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                            board[y][x] = currentPiece.color;
                        }
                    }
                }
            }
            clearLines();
            spawnPiece();
        }
        
        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell)) {
                    board.splice(r, 1);
                    board.unshift(new Array(COLS).fill(0));
                    cleared++;
                    r++;
                }
            }
            
            if (cleared > 0) {
                const points = [0, 100, 300, 500, 800][cleared] || 1200;
                score += points * level;
                lines += cleared;
                
                // Level up every 10 lines
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
            }
        }
        
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, BLOCK - 2);
            
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, 4);
            ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, 4, BLOCK - 2);
            
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(x * BLOCK + 1, y * BLOCK + BLOCK - 5, BLOCK - 2, 4);
            ctx.fillRect(x * BLOCK + BLOCK - 5, y * BLOCK + 1, 4, BLOCK - 2);
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c, r, board[r][c]);
                    }
                }
            }
            
            // Draw current piece
            if (currentPiece) {
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            drawBlock(ctx, currentX + c, currentY + r, currentPiece.color);
                        }
                    }
                }
            }
            
            // Draw ghost piece
            if (currentPiece) {
                let ghostY = currentY;
                while (!collision(0, ghostY - currentY + 1, currentPiece.shape)) {
                    ghostY++;
                }
                if (ghostY !== currentY) {
                    ctx.globalAlpha = 0.2;
                    for (let r = 0; r < currentPiece.shape.length; r++) {
                        for (let c = 0; c < currentPiece.shape[r].length; c++) {
                            if (currentPiece.shape[r][c]) {
                                drawBlock(ctx, currentX + c, ghostY + r, currentPiece.color);
                            }
                        }
                    }
                    ctx.globalAlpha = 1;
                }
            }
        }
        
        function drawNext() {
            nextCtx.fillStyle = '#000';
            nextCtx.fillRect(0, 0, 80, 80);
            
            if (nextPiece) {
                const offsetX = (4 - nextPiece.shape[0].length) / 2;
                const offsetY = (4 - nextPiece.shape.length) / 2;
                const size = 15;
                
                for (let r = 0; r < nextPiece.shape.length; r++) {
                    for (let c = 0; c < nextPiece.shape[r].length; c++) {
                        if (nextPiece.shape[r][c]) {
                            nextCtx.fillStyle = nextPiece.color;
                            nextCtx.fillRect(
                                (offsetX + c) * size + 1,
                                (offsetY + r) * size + 1,
                                size - 2, size - 2
                            );
                        }
                    }
                }
            }
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').classList.add('show');
        }
        
        function startGame() {
            createBoard();
            score = 0;
            level = 1;
            lines = 0;
            dropInterval = 1000;
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            
            nextPiece = randomPiece();
            spawnPiece();
            gameRunning = true;
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over').classList.remove('show');
            
            lastDrop = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        function gameLoop(time) {
            if (!gameRunning) return;
            
            if (time - lastDrop > dropInterval) {
                if (!movePiece(0, 1)) {
                    lockPiece();
                }
                lastDrop = time;
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Controls
        document.addEventListener('keydown', e => {
            if (!gameRunning) {
                if (e.code === 'Space') startGame();
                return;
            }
            
            switch (e.code) {
                case 'ArrowLeft':
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    movePiece(0, 1);
                    break;
                case 'ArrowUp':
                    rotate();
                    break;
                case 'Space':
                    // Hard drop
                    while (movePiece(0, 1));
                    lockPiece();
                    break;
            }
            draw();
        });
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        
        createBoard();
        draw();
    </script>
</body>
</html>
