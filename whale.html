<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Adventure 🐋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #001133, #003366, #000033);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #game-container {
            position: relative;
            border: 4px solid #00bfff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,191,255,0.3);
        }
        
        canvas {
            display: block;
            background: transparent;
        }
        
        #score {
            color: #00bfff;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #instructions {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        #start-screen, #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        #game-over {
            display: none;
        }
        
        #game-over.show {
            display: flex;
        }
        
        #start-screen h2, #game-over h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #00bfff;
        }
        
        #start-screen p {
            margin-bottom: 1rem;
        }
        
        .btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: #00bfff;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00bfff;
        }
        
        #final-score {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <h1>🐋 Whale Adventure</h1>
    <div id="score">Score: 0</div>
    <div id="game-container">
        <canvas id="game" width="400" height="500"></canvas>
        <div id="start-screen">
            <h2>🐋 Dive Deep!</h2>
            <p>Avoid obstacles & collect bubbles!</p>
            <button class="btn" id="start-btn">Start Game</button>
        </div>
        <div id="game-over">
            <h2>💥 Game Over!</h2>
            <div id="final-score">Score: 0</div>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>
    </div>
    <div id="instructions">Hold SPACE or Click to swim up | Release to sink</div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        
        let whale = { x: 80, y: 250, vy: 0 };
        let obstacles = [];
        let bubbles = [];
        let score = 0;
        let gameRunning = false;
        let gameLoop;
        let frameCount = 0;
        let keysPressed = false;
        
        function drawWhale() {
            const x = whale.x;
            const y = whale.y;
            
            ctx.save();
            ctx.translate(x, y);
            
            // Angle based on velocity
            const angle = Math.min(Math.max(whale.vy * 0.1, -0.4), 0.4);
            ctx.rotate(angle);
            
            // Tail
            ctx.fillStyle = '#5588ff';
            ctx.beginPath();
            ctx.moveTo(-30, 0);
            ctx.lineTo(-45, -15);
            ctx.lineTo(-45, 15);
            ctx.closePath();
            ctx.fill();
            
            // Body
            ctx.fillStyle = '#5588ff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 30, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Underbelly
            ctx.fillStyle = '#88aaff';
            ctx.beginPath();
            ctx.ellipse(5, 5, 18, 8, 0, 0, Math.PI);
            ctx.fill();
            
            // Eye (white)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(18, -4, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Pupil (black)
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(20, -4, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Smile
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(22, 2, 6, 0.2, 1.2);
            ctx.stroke();
            
            // Fins
            ctx.fillStyle = '#5588ff';
            ctx.beginPath();
            ctx.moveTo(-5, 8);
            ctx.lineTo(-15, 20);
            ctx.lineTo(5, 12);
            ctx.closePath();
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(-5, -8);
            ctx.lineTo(-15, -20);
            ctx.lineTo(5, -12);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawObstacles() {
            obstacles.forEach(obs => {
                // Rock gradient
                const gradient = ctx.createLinearGradient(obs.x, obs.y, obs.x + obs.width, obs.y);
                gradient.addColorStop(0, '#8B4513');
                gradient.addColorStop(0.5, '#CD853F');
                gradient.addColorStop(1, '#8B4513');
                ctx.fillStyle = gradient;
                
                ctx.beginPath();
                ctx.moveTo(obs.x, HEIGHT);
                ctx.lineTo(obs.x + 15, obs.y);
                ctx.lineTo(obs.x + 30, obs.y + 20);
                ctx.lineTo(obs.x + obs.width, HEIGHT);
                ctx.closePath();
                ctx.fill();
            });
        }
        
        function drawBubbles() {
            bubbles.forEach(b => {
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.stroke();
                
                // Shine spot
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(b.x - b.size/3, b.y - b.size/3, b.size/4, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawBackground() {
            // Deep sea gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            gradient.addColorStop(0, '#003366');
            gradient.addColorStop(0.5, '#001133');
            gradient.addColorStop(1, '#000011');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Light rays from surface
            ctx.fillStyle = 'rgba(0,191,255,0.05)';
            for (let i = 0; i < 5; i++) {
                const x = (i * 100 + frameCount * 0.5) % (WIDTH + 100) - 50;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x + 30, 0);
                ctx.lineTo(x - 20, HEIGHT);
                ctx.lineTo(x - 50, HEIGHT);
                ctx.closePath();
                ctx.fill();
            }
            
            // Floating particles
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            for (let i = 0; i < 20; i++) {
                const px = (i * 73 + frameCount * 0.3) % WIDTH;
                const py = (i * 97 + frameCount * 0.5) % HEIGHT;
                ctx.beginPath();
                ctx.arc(px, py, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            drawBackground();
            drawBubbles();
            drawObstacles();
            drawWhale();
        }
        
        function update() {
            // Whale physics
            if (keysPressed) {
                whale.vy -= 0.6;
            } else {
                whale.vy += 0.3;
            }
            
            whale.vy = Math.max(-8, Math.min(8, whale.vy));
            whale.y += whale.vy;
            
            // Top/bottom bounds (sea floor and surface)
            if (whale.y < 30) {
                whale.y = 30;
                whale.vy = 0;
            }
            if (whale.y > HEIGHT - 30) {
                whale.y = HEIGHT - 30;
                whale.vy = 0;
            }
            
            // Spawn coral obstacles
            if (frameCount % 80 === 0) {
                const height = 60 + Math.random() * 120;
                obstacles.push({
                    x: WIDTH + 20,
                    y: HEIGHT - height,
                    width: 50 + Math.random() * 30,
                    height: height
                });
            }
            
            // Spawn bubbles
            if (frameCount % 100 === 0) {
                bubbles.push({
                    x: WIDTH + 20,
                    y: 50 + Math.random() * (HEIGHT - 150),
                    size: 12 + Math.random() * 10
                });
            }
            
            // Move obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= 3 + score * 0.0005;
                
                // Collision with whale
                const whX = whale.x;
                const whY = whale.y;
                if (whX + 20 > obs.x && whX - 20 < obs.x + obs.width &&
                    whY - 10 < obs.y && whY + 10 > obs.y - obs.height) {
                    endGame();
                    return;
                }
                
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                    scoreEl.textContent = 'Score: ' + score;
                }
            }
            
            // Move and collect bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.x -= 2;
                
                // Check collection
                const dx = whale.x - b.x;
                const dy = whale.y - b.y;
                if (Math.sqrt(dx*dx + dy*dy) < b.size + 25) {
                    bubbles.splice(i, 1);
                    score += 50;
                    scoreEl.textContent = 'Score: ' + score;
                    continue;
                }
                
                if (b.x + b.size < 0) {
                    bubbles.splice(i, 1);
                }
            }
            
            frameCount++;
        }
        
        function gameLoopFn() {
            if (!gameRunning) return;
            update();
            draw();
            if (gameRunning) {
                gameLoop = requestAnimationFrame(gameLoopFn);
            }
        }
        
        function startGame() {
            whale = { x: 80, y: 250, vy: 0 };
            obstacles = [];
            bubbles = [];
            score = 0;
            frameCount = 0;
            scoreEl.textContent = 'Score: 0';
            gameRunning = true;
            startScreen.style.display = 'none';
            gameOverScreen.classList.remove('show');
            gameLoopFn();
        }
        
        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            finalScoreEl.textContent = 'Score: ' + score;
            gameOverScreen.classList.add('show');
        }
        
        // Controls - Keyboard
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                keysPressed = true;
                if (!gameRunning) startGame();
            }
        });
        
        document.addEventListener('keyup', function(e) {
            if (e.code === 'Space') {
                keysPressed = false;
            }
        });
        
        // Controls - Mouse
        document.addEventListener('mousedown', function() {
            keysPressed = true;
        });
        
        document.addEventListener('mouseup', function() {
            keysPressed = false;
        });
        
        // Controls - Touch
        document.addEventListener('touchstart', function(e) {
            e.preventDefault();
            keysPressed = true;
            if (!gameRunning) startGame();
        });
        
        document.addEventListener('touchend', function(e) {
            e.preventDefault();
            keysPressed = false;
        });
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        
        // Wait for page to load fully
        window.onload = function() {
            draw();
        };
    </script>
</body>
</html>
