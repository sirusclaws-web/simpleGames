<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Adventure 🐋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000011;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        h1 {
            color: #00bfff;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        #game-container {
            position: relative;
            border: 4px solid #00bfff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,191,255,0.3);
        }
        
        canvas {
            display: block;
            background: #001133;
        }
        
        #score {
            color: #00bfff;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        
        #instructions {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        #start-screen, #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        #game-over {
            display: none;
        }
        
        #game-over.show {
            display: flex;
        }
        
        #start-screen h2, #game-over h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #00bfff;
        }
        
        .btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: #00bfff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00bfff;
        }
        
        #final-score {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <h1>🐋 Whale Adventure</h1>
    <div id="score">Score: 0</div>
    <div id="game-container">
        <canvas id="game" width="400" height="500"></canvas>
        <div id="start-screen">
            <h2>🐋 Dive Deep!</h2>
            <p>Avoid obstacles & collect bubbles!</p>
            <br>
            <button class="btn" id="start-btn">Start Game</button>
        </div>
        <div id="game-over">
            <h2>💥 Game Over!</h2>
            <div id="final-score">Score: 0</div>
            <button class="btn" id="restart-btn">Play Again</button>
        </div>
    </div>
    <div id="instructions">Hold SPACE or Click to swim up | Release to sink</div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        
        let whale = { x: 80, y: 250, vy: 0 };
        let obstacles = [];
        let bubbles = [];
        let score = 0;
        let gameRunning = false;
        let gameLoop;
        let frameCount = 0;
        let keysPressed = false;
        
        function drawWhale() {
            const x = whale.x;
            const y = whale.y;
            
            ctx.save();
            ctx.translate(x, y);
            
            const angle = Math.min(Math.max(whale.vy * 0.08, -0.5), 0.5);
            ctx.rotate(angle);
            
            // Tail
            ctx.fillStyle = '#FF6B35';
            ctx.beginPath();
            ctx.moveTo(-30, 0);
            ctx.lineTo(-50, -18);
            ctx.lineTo(-50, 18);
            ctx.closePath();
            ctx.fill();
            
            // Body - bright blue whale
            ctx.fillStyle = '#00BFFF';
            ctx.beginPath();
            ctx.ellipse(0, 0, 35, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Belly - lighter blue
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.ellipse(8, 6, 22, 10, 0, 0, Math.PI);
            ctx.fill();
            
            // Eye - white with black pupil
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(20, -5, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(23, -5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Smile
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(25, 2, 8, 0.3, 1.5);
            ctx.stroke();
            
            // Fins
            ctx.fillStyle = '#00BFFF';
            // Top fin
            ctx.beginPath();
            ctx.moveTo(-5, -12);
            ctx.lineTo(-18, -28);
            ctx.lineTo(5, -15);
            ctx.closePath();
            ctx.fill();
            // Bottom fin
            ctx.beginPath();
            ctx.moveTo(-5, 12);
            ctx.lineTo(-18, 28);
            ctx.lineTo(5, 15);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawObstacles() {
            obstacles.forEach(obs => {
                // Draw jellyfish instead of rocks (more visible!)
                if (obs.type === 'jelly') {
                    // Jellyfish body
                    ctx.fillStyle = '#FF69B4';
                    ctx.beginPath();
                    ctx.arc(obs.x, obs.y, obs.size, Math.PI, 0);
                    ctx.fill();
                    
                    // Tentacles
                    ctx.strokeStyle = '#FF69B4';
                    ctx.lineWidth = 3;
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.moveTo(obs.x - obs.size/2 + i * obs.size/4, obs.y);
                        ctx.quadraticCurveTo(
                            obs.x - obs.size/2 + i * obs.size/4 + 5, obs.y + obs.size,
                            obs.x - obs.size/2 + i * obs.size/4, obs.y + obs.size + 10
                        );
                        ctx.stroke();
                    }
                } else {
                    // Seaweed - bright green, very visible!
                    ctx.strokeStyle = '#32CD32';
                    ctx.lineWidth = 8;
                    ctx.beginPath();
                    ctx.moveTo(obs.x, HEIGHT);
                    ctx.quadraticCurveTo(
                        obs.x + 15, obs.y - obs.height/2,
                        obs.x, obs.y - obs.height
                    );
                    ctx.stroke();
                }
            });
        }
        
        function drawBubbles() {
            bubbles.forEach(b => {
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.stroke();
                
                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(b.x - b.size/3, b.y - b.size/3, b.size/3, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawBackground() {
            // Dark sea gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            gradient.addColorStop(0, '#001a33');
            gradient.addColorStop(0.5, '#000d1a');
            gradient.addColorStop(1, '#000011');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Light rays
            ctx.fillStyle = 'rgba(0,191,255,0.04)';
            for (let i = 0; i < 4; i++) {
                const x = (i * 120 + frameCount * 0.3) % (WIDTH + 80) - 40;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x + 40, 0);
                ctx.lineTo(x - 30, HEIGHT);
                ctx.lineTo(x - 70, HEIGHT);
                ctx.closePath();
                ctx.fill();
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            drawBackground();
            drawObstacles();
            drawBubbles();
            drawWhale();
        }
        
        function update() {
            // Whale physics
            if (keysPressed) {
                whale.vy -= 0.5;
            } else {
                whale.vy += 0.25;
            }
            
            whale.vy = Math.max(-6, Math.min(6, whale.vy));
            whale.y += whale.vy;
            
            // Bounds
            if (whale.y < 40) {
                whale.y = 40;
                whale.vy = 0;
            }
            if (whale.y > HEIGHT - 40) {
                whale.y = HEIGHT - 40;
                whale.vy = 0;
            }
            
            // Spawn obstacles
            if (frameCount % 90 === 0) {
                const isJelly = Math.random() > 0.5;
                if (isJelly) {
                    obstacles.push({
                        type: 'jelly',
                        x: WIDTH + 30,
                        y: 40 + Math.random() * (HEIGHT - 120),
                        size: 25 + Math.random() * 15,
                        passed: false
                    });
                } else {
                    obstacles.push({
                        type: 'seaweed',
                        x: WIDTH + 30,
                        y: HEIGHT,
                        height: 80 + Math.random() * 100,
                        passed: false
                    });
                }
            }
            
            // Spawn bubbles
            if (frameCount % 110 === 0) {
                bubbles.push({
                    x: WIDTH + 20,
                    y: 40 + Math.random() * (HEIGHT - 100),
                    size: 10 + Math.random() * 8
                });
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= 3.5 + score * 0.0003;
                
                // Collision check
                let hit = false;
                if (obs.type === 'jelly') {
                    const dx = whale.x - obs.x;
                    const dy = whale.y - obs.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < obs.size + 25) hit = true;
                } else {
                    // Seaweed collision
                    if (whale.x + 25 > obs.x - 10 && whale.x - 25 < obs.x + 10 &&
                        whale.y + 10 > obs.y - obs.height && whale.y < obs.y) {
                        hit = true;
                    }
                }
                
                if (hit) {
                    endGame();
                    return;
                }
                
                if (obs.x + 50 < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                    scoreEl.textContent = 'Score: ' + score;
                }
            }
            
            // Update bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.x -= 2;
                
                const dx = whale.x - b.x;
                const dy = whale.y - b.y;
                if (Math.sqrt(dx*dx + dy*dy) < b.size + 30) {
                    bubbles.splice(i, 1);
                    score += 50;
                    scoreEl.textContent = 'Score: ' + score;
                    continue;
                }
                
                if (b.x + b.size < 0) {
                    bubbles.splice(i, 1);
                }
            }
            
            frameCount++;
        }
        
        function gameLoopFn() {
            if (!gameRunning) return;
            update();
            draw();
            gameLoop = requestAnimationFrame(gameLoopFn);
        }
        
        function startGame() {
            whale = { x: 80, y: 250, vy: 0 };
            obstacles = [];
            bubbles = [];
            score = 0;
            frameCount = 0;
            scoreEl.textContent = 'Score: 0';
            gameRunning = true;
            startScreen.style.display = 'none';
            gameOverScreen.classList.remove('show');
            gameLoopFn();
        }
        
        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            finalScoreEl.textContent = 'Score: ' + score;
            gameOverScreen.classList.add('show');
        }
        
        // Controls
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                keysPressed = true;
                if (!gameRunning) startGame();
            }
        });
        
        document.addEventListener('keyup', function(e) {
            if (e.code === 'Space') keysPressed = false;
        });
        
        document.addEventListener('mousedown', function() {
            keysPressed = true;
        });
        
        document.addEventListener('mouseup', function() {
            keysPressed = false;
        });
        
        document.addEventListener('touchstart', function(e) {
            e.preventDefault();
            keysPressed = true;
            if (!gameRunning) startGame();
        });
        
        document.addEventListener('touchend', function(e) {
            e.preventDefault();
            keysPressed = false;
        });
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        
        draw();
    </script>
</body>
</html>
